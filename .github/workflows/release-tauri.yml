name: release-tauri

on:
  push:
    branches: [main]
    tags: ["v4.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach artifacts to (e.g. v4.0.0-rc.1)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  tag:
    name: auto-tag on version bump
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Tag if Cargo.toml version is new
        run: |
          ver=$(grep '^version' crates/token-dashboard-tauri/Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          tag="v$ver"
          if [ -z "$ver" ]; then
            echo "could not parse version" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists on origin — skipping"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          echo "pushed $tag — release-tauri will fire on the tag ref"

  build:
    name: build (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v4.') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Cargo workspaces put bundle outputs in the workspace-root
          # `target/`, NOT inside the crate that owns tauri.conf.json.
          - os: windows-2022
            artifact_glob: |
              target/release/bundle/msi/*.msi
          - os: macos-14
            artifact_glob: |
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app.tar.gz
          - os: ubuntu-22.04
            artifact_glob: |
              target/release/bundle/deb/*.deb
              target/release/bundle/appimage/*.AppImage
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          save-if: ${{ startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' }}

      - name: System deps (linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev
          version: 1.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend bundle
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install tauri-cli (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@^2

      - name: Tauri build
        working-directory: crates/token-dashboard-tauri
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: token-dashboard-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: attach to GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v4.')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
