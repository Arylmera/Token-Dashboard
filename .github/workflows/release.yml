name: Build executables

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: compute
        shell: bash
        run: |
          base=$(tr -d '[:space:]' < VERSION)
          if [ -z "$base" ]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          version="${base}.${GITHUB_RUN_NUMBER}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${version}"

  build:
    name: Build ${{ matrix.target }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            py_artifact: token-dashboard.exe
          - os: macos-latest
            target: macos-arm64
            py_artifact: token-dashboard
          - os: ubuntu-22.04
            target: linux-x64
            py_artifact: token-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Run unit tests
        run: python -m unittest discover tests

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend bundle
        working-directory: frontend
        run: npm run build

      - name: Build Python executable
        run: pyinstaller --clean --noconfirm token-dashboard.spec

      - name: Stage Python build for electron-builder
        shell: bash
        run: |
          rm -rf dist-py
          mkdir -p dist-py
          cp -R dist/token-dashboard* dist-py/

      - name: Rename standalone Python artifact
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv token-dashboard.exe token-dashboard-${VERSION}-${{ matrix.target }}.exe
          else
            mv token-dashboard token-dashboard-${VERSION}-${{ matrix.target }}
            chmod +x token-dashboard-${VERSION}-${{ matrix.target }}
          fi

      - name: Install electron deps
        working-directory: electron
        run: npm ci

      - name: Build Electron installer
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --publish never

      - name: Collect Electron installers
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p out
          shopt -s nullglob
          for f in electron/dist/*.exe electron/dist/*.dmg electron/dist/*.AppImage electron/dist/*.zip electron/dist/*.deb; do
            base=$(basename "$f")
            cp "$f" "out/token-dashboard-${VERSION}-${{ matrix.target }}-${base}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: token-dashboard-py-${{ matrix.target }}
          path: dist/token-dashboard-*${{ matrix.target }}*

      - uses: actions/upload-artifact@v4
        with:
          name: token-dashboard-electron-${{ matrix.target }}
          path: out/*
          if-no-files-found: warn

  release-tag:
    name: Publish tagged release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
