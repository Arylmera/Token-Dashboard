name: Build executables

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: compute
        shell: bash
        run: |
          base=$(tr -d '[:space:]' < VERSION)
          if [ -z "$base" ]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          version="${base}.${GITHUB_RUN_NUMBER}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${version}"

  build:
    name: Build ${{ matrix.target }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            artifact: token-dashboard.exe
          - os: macos-latest
            target: macos-arm64
            artifact: token-dashboard
          - os: ubuntu-22.04
            target: linux-x64
            artifact: token-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Run unit tests
        run: python -m unittest discover tests

      - name: Build executable
        run: pyinstaller --clean --noconfirm token-dashboard.spec

      - name: Rename artifact
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv token-dashboard.exe token-dashboard-${VERSION}-${{ matrix.target }}.exe
          else
            mv token-dashboard token-dashboard-${VERSION}-${{ matrix.target }}
            chmod +x token-dashboard-${VERSION}-${{ matrix.target }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: token-dashboard-${{ matrix.target }}
          path: dist/token-dashboard-*${{ matrix.target }}*

  release:
    name: Publish release
    needs: [version, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: dist/*
          generate_release_notes: true

  release-tag:
    name: Publish tagged release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
