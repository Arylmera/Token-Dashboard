name: Build executables

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            artifact: token-dashboard.exe
          - os: macos-13
            target: macos-x64
            artifact: token-dashboard
          - os: macos-latest
            target: macos-arm64
            artifact: token-dashboard
          - os: ubuntu-22.04
            target: linux-x64
            artifact: token-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Run unit tests
        run: python -m unittest discover tests

      - name: Build executable
        run: pyinstaller --clean --noconfirm token-dashboard.spec

      - name: Rename artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv token-dashboard.exe token-dashboard-${{ matrix.target }}.exe
          else
            mv token-dashboard token-dashboard-${{ matrix.target }}
            chmod +x token-dashboard-${{ matrix.target }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: token-dashboard-${{ matrix.target }}
          path: dist/token-dashboard-${{ matrix.target }}*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
