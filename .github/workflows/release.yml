name: Build executables

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
      should_release: ${{ steps.compute.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: compute
        shell: bash
        run: |
          base=$(tr -d '[:space:]' < VERSION)
          if [ -z "$base" ]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tag push: take the tag verbatim as the version source.
            version="${GITHUB_REF#refs/tags/v}"
            should_release=true
          else
            # Branch push or PR: derive next patch from existing tags.
            git fetch --tags --force --quiet
            highest=$(git tag --list "v${base}.*" \
              | sed -E "s/^v${base}\.//" \
              | awk '/^[0-9]+$/' \
              | sort -n \
              | tail -n1)
            next_patch=$(( ${highest:--1} + 1 ))
            version="${base}.${next_patch}"
            if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
              should_release=true
            else
              should_release=false
            fi
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${version} (release=${should_release})"

  build:
    name: Build ${{ matrix.target }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            py_artifact: token-dashboard.exe
          - os: macos-latest
            target: macos-arm64
            py_artifact: token-dashboard
          - os: ubuntu-22.04
            target: linux-x64
            py_artifact: token-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Run unit tests
        run: python -m unittest discover tests

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend bundle
        working-directory: frontend
        run: npm run build

      - name: Build Python executable
        run: pyinstaller --clean --noconfirm token-dashboard.spec

      - name: Stage Python build for electron-builder
        shell: bash
        run: |
          rm -rf dist-py
          mkdir -p dist-py
          cp -R dist/token-dashboard* dist-py/

      - name: Rename standalone Python artifact
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv token-dashboard.exe token-dashboard-${VERSION}-${{ matrix.target }}.exe
          else
            mv token-dashboard token-dashboard-${VERSION}-${{ matrix.target }}
            chmod +x token-dashboard-${VERSION}-${{ matrix.target }}
          fi

      - name: Install electron deps
        working-directory: electron
        run: npm ci

      - name: Build Electron installer
        working-directory: electron
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          VERSION: ${{ needs.version.outputs.version }}
        run: npx electron-builder --publish never --config.extraMetadata.version=${VERSION}

      - name: Collect Electron installers
        shell: bash
        run: |
          mkdir -p out
          shopt -s nullglob
          for f in electron/dist/*.exe electron/dist/*.dmg electron/dist/*.AppImage electron/dist/*.zip electron/dist/*.deb; do
            cp "$f" "out/$(basename "$f")"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: token-dashboard-py-${{ matrix.target }}
          path: dist/token-dashboard-*${{ matrix.target }}*

      - uses: actions/upload-artifact@v4
        with:
          name: token-dashboard-electron-${{ matrix.target }}
          path: out/*
          if-no-files-found: warn

  release:
    name: Publish release
    needs: [version, build]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create tag (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping creation."
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: dist/*
          generate_release_notes: true

  winget:
    name: Submit to winget-pkgs
    needs: [version, release]
    if: needs.version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check WINGET_TOKEN
        id: check
        shell: bash
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if [ -z "${WINGET_TOKEN:-}" ]; then
            echo "WINGET_TOKEN not set — skipping winget submission."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit manifest
        if: steps.check.outputs.has_token == 'true'
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: Arylmera.TokenDashboard
          version: ${{ needs.version.outputs.version }}
          installers-regex: 'token-dashboard-.*-windows-x64-Setup\.exe$'
          release-tag: ${{ needs.version.outputs.tag }}
          token: ${{ secrets.WINGET_TOKEN }}
          max-versions-to-keep: 5
          fork-user: Arylmera

  homebrew:
    name: Update Homebrew tap
    needs: [version, release]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
          TAP_REPO: Arylmera/homebrew-token-dashboard
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret not set — skipping tap update."
            exit 0
          fi
          dmg="dist/token-dashboard-${VERSION}-macos-arm64.dmg"
          if [ ! -f "$dmg" ]; then
            echo "DMG not found at $dmg — skipping tap update." >&2
            exit 0
          fi
          sha=$(shasum -a 256 "$dmg" | awk '{print $1}')
          echo "DMG sha256: $sha"

          tmp=$(mktemp -d)
          git clone --depth=1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" \
            "$tmp/tap"
          mkdir -p "$tmp/tap/Casks"
          cp Casks/token-dashboard.rb "$tmp/tap/Casks/token-dashboard.rb"
          # Substitute the placeholder version + sha256 with the real values.
          sed -i.bak -E \
            -e "s/^  version \".*\"$/  version \"${VERSION}\"/" \
            -e "s/^  sha256 \".*\"$/  sha256 \"${sha}\"/" \
            "$tmp/tap/Casks/token-dashboard.rb"
          rm -f "$tmp/tap/Casks/token-dashboard.rb.bak"

          cd "$tmp/tap"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/token-dashboard.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date."
          else
            git commit -m "token-dashboard ${VERSION}"
            # Empty repos have no default branch yet; push to main explicitly.
            git branch -M main
            git push -u origin main
          fi
