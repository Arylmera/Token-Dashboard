# cargo-deny config — see https://embarkstudios.github.io/cargo-deny/
[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = [
    # All unmaintained advisories below are transitive through tauri 2.x
    # (urlpattern -> tauri-utils for the unic-* family; gtk-rs only on Linux).
    # No safe upstream fix available — re-evaluate after tauri bumps.
    "RUSTSEC-2024-0370", # proc-macro-error
    "RUSTSEC-2024-0411", # gtk
    "RUSTSEC-2024-0412", # atk
    "RUSTSEC-2024-0413", # gdk
    "RUSTSEC-2024-0414", # gdkwayland-sys
    "RUSTSEC-2024-0415", # gdkx11
    "RUSTSEC-2024-0416", # gdkx11-sys
    "RUSTSEC-2024-0417", # atk-sys
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk-sys
    "RUSTSEC-2024-0420", # gtk3-macros
    "RUSTSEC-2024-0429", # gtk-rs family announcement
    "RUSTSEC-2025-0075", # unic-char-property
    "RUSTSEC-2025-0080", # unic-char-range
    "RUSTSEC-2025-0081", # unic-common
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0", # webpki-roots
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace deps use "version = *" path entries — allow those.
allow-wildcard-paths = true
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
